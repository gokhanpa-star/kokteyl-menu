<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokteyl Menü - HTML Export</title>
<style>
:root{
  --bg:#08111d; --card:#101b2d; --line:#22324a; --text:#f8fafc; --muted:#9fb0c8;
  --gold:#f4d06f; --green:#34d399; --red:#f87171;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#07101d,#0f172a);color:var(--text)}
.wrap{max-width:1000px;margin:0 auto;padding:16px}
.hero,.card{background:rgba(16,27,45,.96);border:1px solid var(--line);border-radius:20px;padding:16px}
.hero{margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,textarea,button{font:inherit}
input,textarea{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #334155;background:#0a1322;color:var(--text)}
textarea{min-height:110px;resize:vertical}
button{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
.primary{background:var(--gold);color:#192230}
.secondary{background:#1a2840;color:var(--text);border:1px solid #334155}
.green{background:var(--green);color:#052012}
.red{background:var(--red);color:#fff}
.item{background:#0a1322;border:1px solid #22314b;border-radius:16px;padding:14px;margin-bottom:12px}
.tag{display:inline-block;padding:5px 8px;border-radius:999px;background:#102035;border:1px solid #2c4261;margin:4px 6px 0 0;font-size:12px}
.ok{color:#86efac;font-weight:700}.off{color:#fca5a5;font-weight:700}.hidden{display:none}
p,.small{color:var(--muted)} h1,h2,h3{margin:0 0 8px}
@media(max-width:900px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>🍸 Kokteyl Menü</h1>
    <div class="row">
      <button class="primary" onclick="showMode('admin')">Admin</button>
      <button class="secondary" onclick="showMode('guest')">Misafir Menüsü</button>
      <button class="green" onclick="downloadGuestHtml()">HTML İndir</button>
    </div>
    <p class="small" style="margin-top:12px">HTML İndir butonu misafir menüsünü tek dosya olarak indirir. Onu GitHub'a index.html diye yüklediğinde herkes güncel listeyi görür.</p>
  </div>

  <div id="adminMode">
    <div class="grid">
      <div class="card">
        <h2>İçkiler</h2>
        <div class="row">
          <div style="flex:1"><input id="newSpiritName" placeholder="Yeni içki adı"></div>
          <div><button class="green" onclick="addSpirit()">İçki Ekle</button></div>
        </div>
        <div style="height:12px"></div>
        <div id="spiritList"></div>
      </div>

      <div class="card">
        <h2>Yeni Kokteyl</h2>
        <div class="row"><div style="flex:1"><input id="cocktailName" placeholder="Kokteyl adı"></div></div>
        <div style="height:12px"></div>
        <div class="small">Gerekli içkiler</div>
        <div id="spiritChecklist"></div>
        <div style="height:12px"></div>
        <textarea id="cocktailRecipe" placeholder="Kısa tarif veya servis notu"></textarea>
        <div style="height:12px"></div>
        <button class="primary" onclick="addCocktail()">Kokteyl Ekle</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>Kokteyl Veritabanı</h2>
      <div id="allCocktails"></div>
    </div>
  </div>

  <div id="guestMode" class="hidden">
    <div class="card">
      <h2 style="text-align:center;color:#f4d06f;font-size:30px;margin-bottom:16px">Bugünkü Menü</h2>
      <div id="guestMenu"></div>
    </div>
  </div>
</div>

<script>
function uid(){ return Math.random().toString(36).slice(2,10); }

const DEFAULT_DATA = {
  spirits: [
    { id: uid(), name: "Vodka", available: true },
    { id: uid(), name: "Rom", available: true },
    { id: uid(), name: "Cin", available: true },
    { id: uid(), name: "Tekila", available: false },
    { id: uid(), name: "Triple Sec", available: false },
    { id: uid(), name: "Viski", available: true }
  ],
  cocktails: [
    { id: uid(), name: "Mojito", spiritIds: [], recipe: "Rom ile hazırlanır, nane ve lime ile ferah servis edilir." },
    { id: uid(), name: "Gin Tonic", spiritIds: [], recipe: "Cin ve tonik ile buzlu servis edilir." },
    { id: uid(), name: "Margarita", spiritIds: [], recipe: "Tekila ve triple sec ile hazırlanır." },
    { id: uid(), name: "Whiskey Sour", spiritIds: [], recipe: "Viski, limon ve şeker ile çalkalanır." },
    { id: uid(), name: "Vodka Lemon", spiritIds: [], recipe: "Vodka, limon ve buz ile hazırlanır." }
  ]
};

let data = loadData();

function loadData(){
  const raw = localStorage.getItem("cocktailMenuHtmlExportV1");
  if(!raw) return JSON.parse(JSON.stringify(DEFAULT_DATA));
  try { return JSON.parse(raw); }
  catch { return JSON.parse(JSON.stringify(DEFAULT_DATA)); }
}

function saveData(){
  localStorage.setItem("cocktailMenuHtmlExportV1", JSON.stringify(data));
}

function seedLinks(){
  const byName = Object.fromEntries(data.spirits.map(s => [s.name, s.id]));
  function setSpirits(cocktailName, names){
    const c = data.cocktails.find(x => x.name === cocktailName);
    if (c && (!c.spiritIds || c.spiritIds.length === 0)) {
      c.spiritIds = names.map(n => byName[n]).filter(Boolean);
    }
  }
  setSpirits("Mojito", ["Rom"]);
  setSpirits("Gin Tonic", ["Cin"]);
  setSpirits("Margarita", ["Tekila", "Triple Sec"]);
  setSpirits("Whiskey Sour", ["Viski"]);
  setSpirits("Vodka Lemon", ["Vodka"]);
  saveData();
}
seedLinks();

function showMode(mode){
  document.getElementById("adminMode").classList.toggle("hidden", mode !== "admin");
  document.getElementById("guestMode").classList.toggle("hidden", mode !== "guest");
}

function addSpirit(){
  const input = document.getElementById("newSpiritName");
  const name = input.value.trim();
  if(!name) return alert("İçki adı gir.");
  if(data.spirits.some(s => s.name.toLowerCase() === name.toLowerCase())) return alert("Bu içki zaten var.");
  data.spirits.push({ id: uid(), name, available: true });
  input.value = "";
  saveData();
  render();
}

function toggleSpirit(id){
  const s = data.spirits.find(x => x.id === id);
  if(!s) return;
  s.available = !s.available;
  saveData();
  render();
}

function removeSpirit(id){
  data.spirits = data.spirits.filter(s => s.id !== id);
  data.cocktails.forEach(c => c.spiritIds = c.spiritIds.filter(x => x !== id));
  saveData();
  render();
}

function addCocktail(){
  const name = document.getElementById("cocktailName").value.trim();
  const recipe = document.getElementById("cocktailRecipe").value.trim();
  const spiritIds = Array.from(document.querySelectorAll(".check-spirit:checked")).map(x => x.value);
  if(!name) return alert("Kokteyl adı gir.");
  if(!spiritIds.length) return alert("En az 1 içki seç.");
  if(data.cocktails.some(c => c.name.toLowerCase() === name.toLowerCase())) return alert("Bu kokteyl zaten var.");
  data.cocktails.push({ id: uid(), name, spiritIds, recipe });
  document.getElementById("cocktailName").value = "";
  document.getElementById("cocktailRecipe").value = "";
  saveData();
  render();
}

function removeCocktail(id){
  data.cocktails = data.cocktails.filter(c => c.id !== id);
  saveData();
  render();
}

function canMake(c){
  return c.spiritIds.every(id => {
    const s = data.spirits.find(x => x.id === id);
    return s && s.available;
  });
}

function spiritNames(ids){
  return ids.map(id => {
    const s = data.spirits.find(x => x.id === id);
    return s ? s.name : null;
  }).filter(Boolean);
}

function renderSpirits(){
  const root = document.getElementById("spiritList");
  root.innerHTML = "";
  data.spirits.forEach(s => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = '<div class="row" style="justify-content:space-between"><div><h3>'+s.name+'</h3><div class="'+(s.available?'ok':'off')+'">'+(s.available?'Şu an var':'Bitti / yok')+'</div></div><div class="row"><button class="'+(s.available?'secondary':'green')+'" onclick="toggleSpirit(\\''+s.id+'\\')">'+(s.available?'Bitti':'Geldi')+'</button><button class="red" onclick="removeSpirit(\\''+s.id+'\\')">Sil</button></div></div>';
    root.appendChild(div);
  });

  const checklist = document.getElementById("spiritChecklist");
  checklist.innerHTML = "";
  data.spirits.forEach(s => {
    const label = document.createElement("label");
    label.className = "tag";
    label.innerHTML = '<input class="check-spirit" type="checkbox" value="'+s.id+'"> '+s.name;
    checklist.appendChild(label);
  });
}

function renderAllCocktails(){
  const root = document.getElementById("allCocktails");
  root.innerHTML = "";
  if(!data.cocktails.length){
    root.innerHTML = '<div class="small">Henüz kokteyl eklenmedi.</div>';
    return;
  }
  data.cocktails.forEach(c => {
    const ok = canMake(c);
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = '<div class="row" style="justify-content:space-between"><div><h3>'+c.name+'</h3><div class="'+(ok?'ok':'off')+'">'+(ok?'Menüde görünür':'Menüde görünmez')+'</div></div><button class="red" onclick="removeCocktail(\\''+c.id+'\\')">Sil</button></div><div>'+spiritNames(c.spiritIds).map(n => '<span class="tag">'+n+'</span>').join('')+'</div>'+(c.recipe ? '<p>'+c.recipe+'</p>' : '');
    root.appendChild(div);
  });
}

function renderGuestMenu(){
  const root = document.getElementById("guestMenu");
  const visible = data.cocktails.filter(canMake).sort((a,b) => a.name.localeCompare(b.name, "tr"));
  root.innerHTML = "";
  if(!visible.length){
    root.innerHTML = '<div class="item"><h3>Şu an menü boş</h3></div>';
    return;
  }
  visible.forEach(c => {
    const div = document.createElement("div");
    div.className = "item";
    div.innerHTML = '<h3>'+c.name+'</h3><div>'+spiritNames(c.spiritIds).map(n => '<span class="tag">'+n+'</span>').join('')+'</div>';
    root.appendChild(div);
  });
}

function buildGuestHtml(){
  const visible = data.cocktails.filter(canMake).sort((a,b) => a.name.localeCompare(b.name, "tr"));
  const cards = visible.length
    ? visible.map(c => `
      <div class="item">
        <h3>${escapeHtml(c.name)}</h3>
        <div>${spiritNames(c.spiritIds).map(n => `<span class="tag">${escapeHtml(n)}</span>`).join('')}</div>
      </div>`).join('')
    : '<div class="item"><h3>Şu an menü boş</h3></div>';

  return `<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bugünkü Menü</title>
<style>
:root{--bg:#08111d;--card:#101b2d;--line:#22324a;--text:#f8fafc;--gold:#f4d06f}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#07101d,#0f172a);color:var(--text)}
.wrap{max-width:760px;margin:0 auto;padding:16px}
.card{background:rgba(16,27,45,.96);border:1px solid var(--line);border-radius:20px;padding:16px}
.item{background:#0a1322;border:1px solid #22314b;border-radius:16px;padding:14px;margin-bottom:12px}
.tag{display:inline-block;padding:5px 8px;border-radius:999px;background:#102035;border:1px solid #2c4261;margin:4px 6px 0 0;font-size:12px}
h1,h3{margin:0 0 8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <h1 style="text-align:center;color:#f4d06f;font-size:30px;margin-bottom:16px">Bugünkü Menü</h1>
    ${cards}
  </div>
</div>
</body>
</html>`;
}

function escapeHtml(str){
  return String(str).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;');
}

function downloadGuestHtml(){
  const html = buildGuestHtml();
  const blob = new Blob([html], {type:"text/html;charset=utf-8"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "index.html";
  a.click();
  URL.revokeObjectURL(a.href);
}

function render(){
  saveData();
  renderSpirits();
  renderAllCocktails();
  renderGuestMenu();
}

render();
</script>
</body>
</html>
