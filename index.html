<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokteyl Menü (Export/Import)</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:20px}
.container{max-width:800px;margin:auto}
input,button{padding:10px;margin:5px;border-radius:8px;border:none}
button{background:#38bdf8;color:#000;font-weight:bold}
.card{background:#1e293b;padding:10px;margin:10px 0;border-radius:10px}
</style>
</head>
<body>
<div class="container">

<h2>🍸 Admin Panel</h2>

<input id="drink" placeholder="İçki ekle">
<button onclick="addDrink()">Ekle</button>

<div id="drinks"></div>

<hr>

<input id="cocktail" placeholder="Kokteyl adı">
<input id="recipe" placeholder="Tarif">
<button onclick="addCocktail()">Kokteyl ekle</button>

<div id="cocktails"></div>

<hr>

<button onclick="exportData()">📥 Menüyü indir</button>
<input type="file" onchange="importData(event)">

<hr>

<h2>📱 Misafir Menü</h2>
<div id="menu"></div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("menuData")||'{"drinks":[],"cocktails":[]}');

function save(){
 localStorage.setItem("menuData",JSON.stringify(data));
}

function addDrink(){
 const val=document.getElementById("drink").value;
 data.drinks.push({name:val,active:true});
 save(); render();
}

function addCocktail(){
 const name=document.getElementById("cocktail").value;
 const recipe=document.getElementById("recipe").value;
 data.cocktails.push({name,recipe});
 save(); render();
}

function render(){
 const d=document.getElementById("drinks");
 d.innerHTML="";
 data.drinks.forEach(x=>{
   d.innerHTML+=`<div class="card">${x.name}</div>`;
 });

 const c=document.getElementById("cocktails");
 c.innerHTML="";
 data.cocktails.forEach(x=>{
   c.innerHTML+=`<div class="card">${x.name}</div>`;
 });

 const m=document.getElementById("menu");
 m.innerHTML="";
 data.cocktails.forEach(x=>{
   m.innerHTML+=`<div class="card"><b>${x.name}</b><br>${x.recipe}</div>`;
 });
}

function exportData(){
 const blob = new Blob([JSON.stringify(data)], {type:"application/json"});
 const a = document.createElement("a");
 a.href = URL.createObjectURL(blob);
 a.download = "menu.json";
 a.click();
}

function importData(e){
 const file = e.target.files[0];
 const reader = new FileReader();
 reader.onload = function(){
   data = JSON.parse(reader.result);
   save();
   render();
 };
 reader.readAsText(file);
}

render();
</script>

</body>
</html>
