<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokteyl Menü - QR</title>
<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:20px}
.container{max-width:800px;margin:auto}
textarea,button,input{width:100%;margin:6px 0;padding:10px;border-radius:8px;border:none}
button{background:#f4d06f;color:#000;font-weight:bold}
.card{background:#1e293b;padding:10px;border-radius:10px;margin:10px 0}
</style>
</head>
<body>
<div class="container">

<h2>🍸 Menü Transfer</h2>

<textarea id="dataBox" placeholder="Veri burada oluşacak"></textarea>

<button onclick="generate()">Veriyi Hazırla</button>
<button onclick="copyData()">Kopyala</button>
<button onclick="makeQR()">QR Oluştur</button>

<div id="qr"></div>

</div>

<script>
let data = localStorage.getItem("cocktailMenuTransferV1") || "";

function generate(){
 document.getElementById("dataBox").value = btoa(data);
}

async function copyData(){
 const box = document.getElementById("dataBox");
 try{
  await navigator.clipboard.writeText(box.value);
  alert("Kopyalandı");
 }catch{
  box.select();
 }
}

function makeQR(){
 const val = document.getElementById("dataBox").value;
 document.getElementById("qr").innerHTML =
 `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${val}">`;
}
</script>

</body>
</html>
