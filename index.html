<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipsy Daisy</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container {
  max-width:700px;
  margin:auto;
  padding:20px;
}

.logo {
  width:300px;
  margin-bottom:20px;
}

.item {
  border-bottom:1px solid #333;
  padding:10px 0;
}

.name {
  color:#f4d06f;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

  <img src="logo.png" class="logo">

  <div id="menu"></div>

</div>

<script src="data.js"></script>

<script>
const menu = document.getElementById("menu");
const data = window.APP_DATA;

function canMake(c) {
  return c.spiritIds.every(id => {
    const s = data.spirits.find(x => x.id === id);
    return s && s.available;
  });
}

data.cocktails
  .filter(canMake)
  .forEach(c => {
    const div = document.createElement("div");
    div.className = "item";

    const ingredients = c.spiritIds
      .map(id => {
        const s = data.spirits.find(x => x.id === id);
        return s ? s.name : "";
      })
      .join(", ");

    div.innerHTML = `
      <div class="name">${c.name}</div>
      <div>${ingredients}</div>
    `;

    menu.appendChild(div);
  });
</script>

</body>
</html>
