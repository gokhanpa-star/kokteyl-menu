<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipsy Daisy</title>
<style>
body{margin:0;font-family:Arial;background:#0f172a;color:#fff;text-align:center}
.wrap{max-width:800px;margin:auto;padding:20px}
img{width:260px;margin:20px auto;display:block}
.item{border-bottom:1px solid #444;padding:10px 0}
.name{font-weight:bold;color:#f4d06f}
</style>
</head>
<body>
<div class="wrap">
<img src="logo.png">
<div id="menu"></div>
</div>

<script src="data.js"></script>
<script>
const menu = document.getElementById("menu");
const data = window.APP_DATA || {cocktails:[]};

data.cocktails.forEach(c=>{
  const div=document.createElement("div");
  div.className="item";
  div.innerHTML = `<div class="name">${c.name}</div>
  <div>${c.spiritIds.map(id=>{
    const s=data.spirits.find(x=>x.id===id);
    return s?s.name:"";
  }).join(", ")}</div>`;
  menu.appendChild(div);
});
</script>
</body>
</html>
