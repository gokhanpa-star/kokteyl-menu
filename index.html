<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipsy Daisy</title>
<style>
:root{
  --bg:#08111d; --card:#101b2d; --line:#22324a; --text:#f8fafc; --muted:#9fb0c8;
  --gold:#f4d06f; --green:#34d399; --red:#f87171; --blue:#7dd3fc; --pill:#102035;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#07101d,#0f172a);color:var(--text)}
.wrap{max-width:1080px;margin:0 auto;padding:16px}
.hero,.card{background:rgba(16,27,45,.96);border:1px solid var(--line);border-radius:20px;padding:16px}
.hero{margin-bottom:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
input,textarea,button,select{font:inherit}
input,textarea,select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid #334155;background:#0a1322;color:var(--text)}
textarea{min-height:110px;resize:vertical}
button{border:none;border-radius:12px;padding:10px 14px;font-weight:700;cursor:pointer}
.primary{background:var(--gold);color:#192230}
.secondary{background:#1a2840;color:var(--text);border:1px solid #334155}
.green{background:var(--green);color:#052012}
.red{background:var(--red);color:#fff}
.blue{background:var(--blue);color:#042236}
.item{background:#0a1322;border:1px solid #22314b;border-radius:16px;padding:14px;margin-bottom:12px}
.tag{display:inline-block;padding:5px 8px;border-radius:999px;background:var(--pill);border:1px solid #2c4261;margin:4px 6px 0 0;font-size:12px}
.ok{color:#86efac;font-weight:700}.off{color:#fca5a5;font-weight:700}.hidden{display:none}
p,.small{color:var(--muted)} h1,h2,h3{margin:0 0 8px}
.star{font-size:18px;color:var(--gold);margin-left:6px}
.tools{display:grid;grid-template-columns:1fr 180px;gap:10px;margin-bottom:16px}
.counts{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}
.stat{background:#0a1322;border:1px solid #22314b;border-radius:14px;padding:12px}
.num{font-size:24px;font-weight:700;color:var(--gold)}
.brand{text-align:center}
.brand img{width:320px;max-width:90%;display:block;margin:0 auto 10px auto;filter:drop-shadow(0 0 16px rgba(244,208,111,.35))}
@media(max-width:900px){.grid,.tools,.counts{grid-template-columns:1fr}.brand img{width:260px}}
</style>
</head>
<body>
<div class="wrap">

  <div id="adminHero" class="hero">
    <div class="brand">
      <img src="logo.png" alt="Tipsy Daisy logo">
    </div>

    <div class="row">
      <button id="btnAdmin" class="primary" type="button">Admin</button>
      <button id="btnGuest" class="secondary" type="button">Misafir Menüsü</button>
      <button id="btnUpdate" class="green" type="button">Güncelle</button>
    </div>

    <div class="counts">
      <div class="stat"><div class="small">Toplam İçki</div><div class="num" id="statSpirits">0</div></div>
      <div class="stat"><div class="small">Toplam Kokteyl</div><div class="num" id="statCocktails">0</div></div>
      <div class="stat"><div class="small">Menüde Görünen</div><div class="num" id="statVisible">0</div></div>
      <div class="stat"><div class="small">Favori</div><div class="num" id="statFavorites">0</div></div>
    </div>
  </div>

  <div id="adminMode">
    <div class="grid">
      <div class="card">
        <h2>İçkiler</h2>
        <div class="row">
          <div style="flex:1"><input id="newSpiritName" placeholder="Yeni içki adı"></div>
          <div><button id="btnAddSpirit" class="green" type="button">İçki Ekle</button></div>
        </div>
        <div style="height:12px"></div>
        <div id="spiritList"></div>
      </div>

      <div class="card">
        <h2>Yeni Kokteyl</h2>
        <div class="row"><div style="flex:1"><input id="cocktailName" placeholder="Kokteyl adı"></div></div>
        <div style="height:12px"></div>
        <div class="row">
          <div style="flex:1">
            <select id="cocktailCategory">
              <option value="">Kategori seç</option>
              <option>Ferah</option>
              <option>Sert</option>
              <option>Tatlı</option>
              <option>Ekşi</option>
              <option>Klasik</option>
              <option>Meyvemsi</option>
            </select>
          </div>
          <div><label class="tag"><input id="cocktailFavorite" type="checkbox"> Favori</label></div>
        </div>
        <div style="height:12px"></div>
        <div class="small">Gerekli içkiler</div>
        <div id="spiritChecklist"></div>
        <div style="height:12px"></div>
        <textarea id="cocktailRecipe" placeholder="Kısa tarif veya servis notu"></textarea>
        <div style="height:12px"></div>
        <button id="btnAddCocktail" class="primary" type="button">Kokteyl Ekle</button>
        <button id="btnCancelEdit" class="secondary hidden" type="button">Düzenlemeyi İptal Et</button>
      </div>
    </div>

    <div class="card" style="margin-top:16px">
      <h2>Kokteyl Veritabanı</h2>
      <div id="allCocktails"></div>
    </div>
  </div>

  <div id="guestMode" class="hidden">
    <div class="card">
      <div class="brand" style="margin-bottom:20px">
        <img src="logo.png" alt="Tipsy Daisy logo">
      </div>

      <div class="tools">
        <input id="searchInput" placeholder="Kokteyl veya içerik ara">
        <select id="filterCategory">
          <option value="">Tüm kategoriler</option>
          <option>Ferah</option>
          <option>Sert</option>
          <option>Tatlı</option>
          <option>Ekşi</option>
          <option>Klasik</option>
          <option>Meyvemsi</option>
          <option>Favoriler</option>
        </select>
      </div>

      <div id="guestMenu"></div>

      
    </div>
  </div>

</div>

<script src="data.js"></script>
<script>
(function(){
  function uid(){ return Math.random().toString(36).slice(2,10); }
  var data = window.APP_DATA || { spirits: [], cocktails: [] };
  var editingCocktailId = null;

  function normalizeData(){
    if(!Array.isArray(data.spirits)) data.spirits = [];
    if(!Array.isArray(data.cocktails)) data.cocktails = [];
    data.spirits.forEach(function(s){
      if(!s.id) s.id = uid();
      if(typeof s.available !== "boolean") s.available = true;
    });
    data.cocktails.forEach(function(c){
      if(!c.id) c.id = uid();
      if(!Array.isArray(c.spiritIds)) c.spiritIds = [];
      if(typeof c.favorite !== "boolean") c.favorite = false;
      if(!c.category) c.category = "";
    });
  }
  normalizeData();

  function showMode(mode){
    var isAdmin = mode === "admin";
    document.getElementById("adminHero").classList.toggle("hidden", !isAdmin);
    document.getElementById("adminMode").classList.toggle("hidden", !isAdmin);
    document.getElementById("guestMode").classList.toggle("hidden", isAdmin);
  }

  function setCocktailFormMode(){
    var btn = document.getElementById("btnAddCocktail");
    var cancelBtn = document.getElementById("btnCancelEdit");
    if(editingCocktailId){
      btn.textContent = "Değişiklikleri Kaydet";
      cancelBtn.classList.remove("hidden");
    } else {
      btn.textContent = "Kokteyl Ekle";
      cancelBtn.classList.add("hidden");
    }
  }

  function resetCocktailForm(){
    editingCocktailId = null;
    document.getElementById("cocktailName").value = "";
    document.getElementById("cocktailRecipe").value = "";
    document.getElementById("cocktailCategory").value = "";
    document.getElementById("cocktailFavorite").checked = false;
    document.querySelectorAll(".check-spirit").forEach(function(el){ el.checked = false; });
    setCocktailFormMode();
  }

  function addSpirit(){
    var input = document.getElementById("newSpiritName");
    var name = input.value.trim();
    if(!name) return alert("İçki adı gir.");
    if(data.spirits.some(function(s){ return s.name.toLowerCase() === name.toLowerCase(); })) return alert("Bu içki zaten var.");
    data.spirits.push({ id: uid(), name: name, available: true });
    input.value = "";
    render();
  }

  function toggleSpirit(id){
    var s = data.spirits.find(function(x){ return x.id === id; });
    if(!s) return;
    s.available = !s.available;
    render();
  }

  function removeSpirit(id){
    data.spirits = data.spirits.filter(function(s){ return s.id !== id; });
    data.cocktails.forEach(function(c){ c.spiritIds = c.spiritIds.filter(function(x){ return x !== id; }); });
    render();
  }

  function startEditCocktail(id){
    var c = data.cocktails.find(function(x){ return x.id === id; });
    if(!c) return;
    editingCocktailId = id;
    document.getElementById("cocktailName").value = c.name || "";
    document.getElementById("cocktailRecipe").value = c.recipe || "";
    document.getElementById("cocktailCategory").value = c.category || "";
    document.getElementById("cocktailFavorite").checked = !!c.favorite;
    document.querySelectorAll(".check-spirit").forEach(function(el){
      el.checked = c.spiritIds.indexOf(el.value) !== -1;
    });
    setCocktailFormMode();
    window.scrollTo({top:0, behavior:"smooth"});
  }

  function addCocktail(){
    var name = document.getElementById("cocktailName").value.trim();
    var recipe = document.getElementById("cocktailRecipe").value.trim();
    var category = document.getElementById("cocktailCategory").value;
    var favorite = document.getElementById("cocktailFavorite").checked;
    var spiritIds = Array.from(document.querySelectorAll(".check-spirit:checked")).map(function(x){ return x.value; });

    if(!name) return alert("Kokteyl adı gir.");
    if(!spiritIds.length) return alert("En az 1 içki seç.");

    if(editingCocktailId){
      var duplicate = data.cocktails.some(function(c){ return c.id !== editingCocktailId && c.name.toLowerCase() === name.toLowerCase(); });
      if(duplicate) return alert("Bu isimde başka bir kokteyl zaten var.");
      var c = data.cocktails.find(function(x){ return x.id === editingCocktailId; });
      c.name = name; c.recipe = recipe; c.category = category; c.favorite = favorite; c.spiritIds = spiritIds;
      resetCocktailForm();
      render();
      return;
    }

    if(data.cocktails.some(function(c){ return c.name.toLowerCase() === name.toLowerCase(); })) return alert("Bu kokteyl zaten var.");
    data.cocktails.push({ id: uid(), name: name, spiritIds: spiritIds, recipe: recipe, category: category, favorite: favorite });
    resetCocktailForm();
    render();
  }

  function removeCocktail(id){
    data.cocktails = data.cocktails.filter(function(c){ return c.id !== id; });
    render();
  }

  function toggleFavorite(id){
    var c = data.cocktails.find(function(x){ return x.id === id; });
    if(!c) return;
    c.favorite = !c.favorite;
    render();
  }

  function canMake(c){
    return c.spiritIds.every(function(id){
      var s = data.spirits.find(function(x){ return x.id === id; });
      return s && s.available;
    });
  }

  function spiritNames(ids){
    return ids.map(function(id){
      var s = data.spirits.find(function(x){ return x.id === id; });
      return s ? s.name : null;
    }).filter(Boolean);
  }

  function escapeHtml(str){
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  function matchesGuestFilters(c){
    var q = document.getElementById("searchInput").value.trim().toLowerCase();
    var category = document.getElementById("filterCategory").value;
    var haystack = [c.name, c.recipe, c.category].concat(spiritNames(c.spiritIds)).join(" ").toLowerCase();
    var searchOk = !q || haystack.indexOf(q) !== -1;
    var categoryOk = !category || (category === "Favoriler" ? c.favorite : c.category === category);
    return searchOk && categoryOk;
  }

  function updateStats(){
    document.getElementById("statSpirits").textContent = data.spirits.length;
    document.getElementById("statCocktails").textContent = data.cocktails.length;
    document.getElementById("statVisible").textContent = data.cocktails.filter(canMake).length;
    document.getElementById("statFavorites").textContent = data.cocktails.filter(function(c){ return c.favorite; }).length;
  }

  function renderSpirits(){
    var root = document.getElementById("spiritList");
    root.innerHTML = "";
    data.spirits.forEach(function(s){
      var div = document.createElement("div");
      div.className = "item";
      div.innerHTML = '<div class="row" style="justify-content:space-between"><div><h3>' + escapeHtml(s.name) + '</h3><div class="' + (s.available ? 'ok' : 'off') + '">' + (s.available ? 'Şu an var' : 'Bitti / yok') + '</div></div><div class="row"><button class="' + (s.available ? 'secondary' : 'green') + '" type="button" data-toggle-spirit="' + s.id + '">' + (s.available ? 'Bitti' : 'Geldi') + '</button><button class="red" type="button" data-remove-spirit="' + s.id + '">Sil</button></div></div>';
      root.appendChild(div);
    });

    root.querySelectorAll("[data-toggle-spirit]").forEach(function(btn){
      btn.addEventListener("click", function(){ toggleSpirit(btn.getAttribute("data-toggle-spirit")); });
    });
    root.querySelectorAll("[data-remove-spirit]").forEach(function(btn){
      btn.addEventListener("click", function(){ removeSpirit(btn.getAttribute("data-remove-spirit")); });
    });

    var checklist = document.getElementById("spiritChecklist");
    checklist.innerHTML = "";
    data.spirits.forEach(function(s){
      var label = document.createElement("label");
      label.className = "tag";
      label.innerHTML = '<input class="check-spirit" type="checkbox" value="' + s.id + '"> ' + escapeHtml(s.name);
      checklist.appendChild(label);
    });
  }

  function renderAllCocktails(){
    var root = document.getElementById("allCocktails");
    root.innerHTML = "";
    if(!data.cocktails.length){
      root.innerHTML = '<div class="small">Henüz kokteyl eklenmedi.</div>';
      return;
    }

    data.cocktails.forEach(function(c){
      var ok = canMake(c);
      var div = document.createElement("div");
      div.className = "item";
      div.innerHTML =
        '<div class="row" style="justify-content:space-between">' +
        '<div><h3>' + escapeHtml(c.name) + (c.favorite ? '<span class="star">★</span>' : '') + '</h3><div class="' + (ok ? 'ok' : 'off') + '">' + (ok ? 'Menüde görünür' : 'Menüde görünmez') + '</div></div>' +
        '<div class="row"><button class="secondary" type="button" data-edit-cocktail="' + c.id + '">Düzenle</button><button class="blue" type="button" data-favorite-cocktail="' + c.id + '">' + (c.favorite ? 'Favoriden Çıkar' : 'Favori Yap') + '</button><button class="red" type="button" data-remove-cocktail="' + c.id + '">Sil</button></div>' +
        '</div>' +
        '<div>' + (c.category ? '<span class="tag">' + escapeHtml(c.category) + '</span>' : '') + spiritNames(c.spiritIds).map(function(n){ return '<span class="tag">' + escapeHtml(n) + '</span>'; }).join('') + '</div>' +
        (c.recipe ? '<p>' + escapeHtml(c.recipe) + '</p>' : '');
      root.appendChild(div);
    });

    root.querySelectorAll("[data-edit-cocktail]").forEach(function(btn){
      btn.addEventListener("click", function(){ startEditCocktail(btn.getAttribute("data-edit-cocktail")); });
    });
    root.querySelectorAll("[data-remove-cocktail]").forEach(function(btn){
      btn.addEventListener("click", function(){ removeCocktail(btn.getAttribute("data-remove-cocktail")); });
    });
    root.querySelectorAll("[data-favorite-cocktail]").forEach(function(btn){
      btn.addEventListener("click", function(){ toggleFavorite(btn.getAttribute("data-favorite-cocktail")); });
    });
  }

  function renderGuestMenu(){
    var root = document.getElementById("guestMenu");
    var visible = data.cocktails.filter(function(c){ return canMake(c) && matchesGuestFilters(c); }).sort(function(a,b){
      if(a.favorite !== b.favorite) return a.favorite ? -1 : 1;
      return a.name.localeCompare(b.name, "tr");
    });

    root.innerHTML = "";
    if(!visible.length){
      root.innerHTML = '<div class="item"><h3>Sonuç bulunamadı</h3></div>';
      return;
    }

    visible.forEach(function(c){
      var div = document.createElement("div");
      div.className = "item";
      div.innerHTML = '<h3>' + escapeHtml(c.name) + (c.favorite ? '<span class="star">★</span>' : '') + '</h3><div>' + (c.category ? '<span class="tag">' + escapeHtml(c.category) + '</span>' : '') + spiritNames(c.spiritIds).map(function(n){ return '<span class="tag">' + escapeHtml(n) + '</span>'; }).join('') + '</div>';
      root.appendChild(div);
    });
  }

  function render(){
    updateStats();
    renderSpirits();
    renderAllCocktails();
    renderGuestMenu();
    setCocktailFormMode();
  }

  document.getElementById("btnAdmin").addEventListener("click", function(){ showMode("admin"); });
  document.getElementById("btnGuest").addEventListener("click", function(){ showMode("guest"); });
  document.getElementById("btnBackAdmin").addEventListener("click", function(){ showMode("admin"); });
  document.getElementById("btnAddSpirit").addEventListener("click", addSpirit);
  document.getElementById("btnUpdate").addEventListener("click", function(){ alert("Dosyaları güncellemek için data.js ve index.html’i tekrar yükleyin"); });
  document.getElementById("btnAddCocktail").addEventListener("click", addCocktail);
  document.getElementById("btnCancelEdit").addEventListener("click", resetCocktailForm);
  document.getElementById("searchInput").addEventListener("input", renderGuestMenu);
  document.getElementById("filterCategory").addEventListener("change", renderGuestMenu);

  showMode("admin");
  render();
})();
</script>
</body>
</html>
