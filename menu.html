<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kokteyl Menü</title>
<style>
body {
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
.container {
  padding:20px;
  max-width:600px;
  margin:auto;
}
h1 {
  text-align:center;
  color:#facc15;
}
.card {
  background:#1e293b;
  padding:15px;
  margin-bottom:10px;
  border-radius:12px;
}
</style>
</head>
<body>

<div class="container">
<h1>🍸 Menü</h1>
<div id="menu"></div>
</div>

<script>
const data = JSON.parse(localStorage.getItem("homeCocktailQrMenu") || "{}");

function canMake(c){
  return c.spiritIds.every(id=>{
    const s = data.spirits.find(x=>x.id===id);
    return s && s.available;
  });
}

function spiritNames(ids){
  return ids.map(id=>{
    const s = data.spirits.find(x=>x.id===id);
    return s?.name;
  });
}

const menu = document.getElementById("menu");

if(!data.cocktails){
  menu.innerHTML = "Henüz menü oluşturulmadı";
}else{
  data.cocktails.filter(canMake).forEach(c=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <h3>${c.name}</h3>
      <small>${spiritNames(c.spiritIds).join(", ")}</small>
      <p>${c.recipe || ""}</p>
    `;
    menu.appendChild(div);
  });
}
</script>

</body>
</html>
